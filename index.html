<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>사장마켓 - 상담 신청</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: { colors: { 'sajang-orange': '#ff8224' } } }
        }
    </script>
    <style>
        body { -webkit-tap-highlight-color: transparent; font-family: sans-serif; background-color: #f8f9fa; }
        .tab.active { border-bottom-color: #ff8224; color: #ff8224; font-weight: bold; }
        input:focus, textarea:focus { outline: none !important; border-color: #ff8224 !important; box-shadow: 0 0 0 1px #ff8224 !important; }
    </style>
</head>
<body class="text-gray-900">
    <div class="max-w-md mx-auto min-h-screen bg-white shadow-sm flex flex-col">
        <header class="pt-6 pb-2 px-6 flex justify-center border-b border-gray-100">
            <img src="image_0.png" alt="사장마켓 로고" class="h-9 w-auto">
        </header>

        <div class="flex border-b border-gray-200 text-sm text-gray-500">
            <div id="tab-retry" class="tab w-1/2 text-center py-4 cursor-pointer active" onclick="selectTab('재상담 요청')">재상담 요청</div>
            <div id="tab-install" class="tab w-1/2 text-center py-4 cursor-pointer" onclick="selectTab('설치 문의')">설치 문의</div>
        </div>

        <form id="contactForm" class="flex-grow p-6 space-y-7">
            <input type="hidden" name="type" id="consultType" value="재상담 요청">
            
            <div class="relative">
                <input type="tel" name="phone" id="phone" required class="block w-full px-0 py-3 pt-6 text-base bg-transparent border-0 border-b-2 border-gray-300 appearance-none focus:ring-0 peer" placeholder=" " />
                <label for="phone" class="absolute text-gray-500 duration-300 transform -translate-y-4 scale-75 top-4 z-10 origin-[0] peer-placeholder-shown:scale-100 peer-placeholder-shown:translate-y-0 peer-focus:scale-75 peer-focus:-translate-y-4 peer-focus:text-sajang-orange">휴대폰번호</label>
            </div>

            <div class="relative">
                <input type="text" name="business_no" id="business_no" class="block w-full px-0 py-3 pt-6 text-base bg-transparent border-0 border-b-2 border-gray-300 appearance-none focus:ring-0 peer" placeholder=" " />
                <label for="business_no" class="absolute text-gray-500 duration-300 transform -translate-y-4 scale-75 top-4 z-10 origin-[0] peer-placeholder-shown:scale-100 peer-placeholder-shown:translate-y-0 peer-focus:scale-75 peer-focus:-translate-y-4 peer-focus:text-sajang-orange">사업자번호 (선택)</label>
            </div>

            <div class="relative">
                <textarea name="inquiry" id="inquiry" required rows="3" class="block w-full px-0 py-3 pt-6 text-base bg-transparent border-0 border-b-2 border-gray-300 appearance-none focus:ring-0 peer resize-none" placeholder=" "></textarea>
                <label for="inquiry" class="absolute text-gray-500 duration-300 transform -translate-y-4 scale-75 top-4 z-10 origin-[0] peer-placeholder-shown:scale-100 peer-placeholder-shown:translate-y-0 peer-focus:scale-75 peer-focus:-translate-y-4 peer-focus:text-sajang-orange">문의 내용 (필수)</label>
                <p class="mt-1 text-xs text-gray-400">(예) 2시에 전화주세요</p>
            </div>

            <div class="pt-4 space-y-3">
                <div class="flex items-center">
                    <input id="agree1" type="checkbox" required class="h-5 w-5 text-sajang-orange border-gray-300 rounded">
                    <label for="agree1" class="ml-3 text-sm text-gray-600">[필수] 개인정보 수집 및 이용 동의</label>
                </div>
                <div class="flex items-center">
                    <input id="agree2" type="checkbox" required class="h-5 w-5 text-sajang-orange border-gray-300 rounded">
                    <label for="agree2" class="ml-3 text-sm text-gray-600">[필수] 개인정보 제3자 제공 동의</label>
                </div>
            </div>

            <button type="submit" id="submitBtn" class="w-full py-4 bg-sajang-orange text-white font-bold rounded-xl shadow-lg active:scale-95 transition-transform">
                상담 신청하기
            </button>
        </form>
    </div>

    <script>
        function selectTab(type) {
            document.getElementById('consultType').value = type;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            if(type === '재상담 요청') document.getElementById('tab-retry').classList.add('active');
            else document.getElementById('tab-install').classList.add('active');
        }

        const scriptURL = '여기에_배포한_APPS_SCRIPT_URL_입력'; // <-- 중요!
        const form = document.getElementById('contactForm');

        form.addEventListener('submit', e => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.innerText = '전송 중...';
            btn.disabled = true;

            fetch(scriptURL, { method: 'POST', body: new FormData(form)})
                .then(response => {
                    alert('신청이 완료되었습니다!');
                    form.reset();
                    btn.innerText = '상담 신청하기';
                    btn.disabled = false;
                })
                .catch(error => {
                    alert('오류가 발생했습니다. 다시 시도해 주세요.');
                    btn.disabled = false;
                });
        });
    </script>
</body>
</html>
